# Agent-layer threat patterns for Sage
#
# Author: ATR (Agent Threat Rules) community contributors
# Upstream: https://github.com/Agent-Threat-Rule/agent-threat-rules
# Contributed per issue #30 + vaclavbelak's comment
#   (https://github.com/gendigitalinc/sage/issues/30#issuecomment-4266904912)
#
# License: MIT
#   Rules in this file are adapted from the ATR project
#   (https://github.com/Agent-Threat-Rule/agent-threat-rules),
#   Copyright (c) 2026 ATR Contributors, and are included in Sage
#   under the ATR MIT license per explicit agreement in issue #30.
#   Sage-specific modifications to each rule are noted in its comment block.
#
# What this file covers (gaps vs Sage's existing rules):
#   MCP tool / response attacks CLT-MCP-004      (1 rule -- path traversal)
#   Skill package compromise    CLT-SKL-001..008  (6 rules -- IDs 001,002,004,005,006,008; 003/007 dropped for FP risk)
#   Context exfiltration        CLT-CTX-003       (1 rule -- PEM key leak)
#   Supply chain                CLT-SUPPLY-002    (1 rule)
#
#   All prompt_injection rules have been moved to prompt-injection.yaml:
#     CLT-PI-052 (IMPORTANT-tag shadowing, ex CLT-MCP-002)
#     CLT-PI-091..093 (HTML-comment delivery, jailbreak persona, CJK pivot)
#   Dropped: CLT-CTX-002 (instruction tampering) -- covered by CLT-PI-001..005
#
# Design notes:
#   - All rules use `match_on: content` so they fire on Write/Edit content,
#     plugin/skill file scans, and any agent integration that passes a
#     `content` artifact. They complement (do not duplicate) Sage's existing
#     command/URL/credential-file rules.
#   - Confidence values are calibrated to Sage's policy zones (docs/decision-pipeline.md):
#     0.95 = attack-only signal, deny under all sensitivities
#     0.85 = high-precision attack pattern, deny paranoid/balanced, ask relaxed
#   - `case_insensitive: true` replaces ATR's `(?i)` inline flag.

# ===========================================================================
# MCP TOOL & RESPONSE POISONING
# ===========================================================================

- id: "CLT-MCP-004"
  category: mcp_poisoning
  severity: warning
  confidence: 0.85
  pattern: "\\.\\.[\\/\\\\](?:\\.\\.[\\/\\\\])+(?:etc|proc|root|sys|boot|passwd|shadow|shadow\\.bak|master\\.key)(?:[\\/\\\\]|\\s|$)"
  match_on: content
  case_insensitive: false
  title: "Path traversal targeting system directory (/etc, /proc, /root, /sys, ...)"
  expires_at: null
  revoked: false
  # Adapted from ATR-2026-00012: narrowed to require 2+ traversal hops terminating
  # in a sensitive system directory (dropped dev, hosts from ATR's list); reduces
  # FP on benign code examples that use relative paths like ../../src/.
  # Fires in pre-hook (Write/Edit content blocking) and session-start plugin scans
  # only; post-hook scanning is limited to category=prompt_injection rules.

# ===========================================================================
# SKILL PACKAGE COMPROMISE  --  malicious content inside SKILL.md, plugin
# manifests, or skill package files.
# ===========================================================================

- id: "CLT-SKL-001"
  category: skill_compromise
  severity: critical
  confidence: 0.85
  pattern: "you\\s+(must|should|will|shall)\\s+(ignore|disregard|override|forget|bypass|circumvent|supersede|set\\s+aside|discard|abandon)\\s+(all\\s+)?(previous|prior|system|safety|security)\\s+(instructions?|prompts?|rules?|guidelines?|policies|restrictions?)"
  match_on: content
  case_insensitive: true
  title: "SKILL.md prompt injection via mandatory override"
  expires_at: null
  revoked: false
  # Adapted from ATR-2026-00120: simplified to single regex targeting the
  # mandatory-subject ("you must/shall") framing only; omits ATR's broader
  # context-window injection and multi-condition layers.
  # Intentional layering with CLT-PI-001..004: those rules catch the bare
  # imperative verb; this rule adds a distinct signal for the explicit mandatory
  # subject, increasing confidence when both fire on the same payload.

# CLT-SKL-003 intentionally omitted — dropped for FP risk during ATR curation.

- id: "CLT-SKL-002"
  category: skill_compromise
  severity: critical
  confidence: 0.85
  pattern: "(eval\\s*\\$\\(\\s*echo\\s+[\"'][A-Za-z0-9+/=]{20,}[\"']\\s*\\|\\s*base64\\s+-d|echo\\s+[\"'][A-Za-z0-9+/=]{20,}[\"']\\s*\\|\\s*base64\\s+(-d|--decode)\\s*\\|\\s*(bash|sh|python|node|ruby|perl))"
  match_on: content
  case_insensitive: true
  title: "Base64-encoded payload piped to interpreter inside skill content"
  expires_at: null
  revoked: false
  # Source: ATR-2026-00121 (pattern unchanged from upstream).

- id: "CLT-SKL-004"
  category: skill_compromise
  severity: critical
  confidence: 0.85
  pattern: "<!--[\\s\\S]{0,200}?(agent\\s+should|send\\s+all|output\\s+all|exfiltrate|curl\\s|wget\\s|post\\s+.{0,30}(key|credential|token|password|secret)|api[_-]?key.{0,30}https?://)"
  match_on: content
  case_insensitive: true
  title: "Hidden payload in HTML comment within skill content"
  expires_at: null
  revoked: false
  # Adapted from ATR-2026-00128: changed ATR's [^>] lookahead to [\s\S] to avoid
  # false negatives when a hyphen precedes an exfil keyword; maintains same
  # exfil-keyword focus (distinct from CLT-PI-002's instruction-override focus).

- id: "CLT-SKL-005"
  category: skill_compromise
  severity: critical
  confidence: 0.95
  pattern: "(?:\\uDB40[\\uDC00-\\uDC7F]){3,}"
  match_on: content
  case_insensitive: false
  title: "Unicode Tag character smuggling (U+E0000..U+E007F) in skill content"
  expires_at: null
  revoked: false
  # Source: ATR-2026-00129 (pattern unchanged from upstream). Tag characters
  # are invisible to humans but visible to LLMs; 3+ in sequence is an
  # injection signature with no legitimate use.

- id: "CLT-SKL-006"
  category: skill_compromise
  severity: critical
  confidence: 0.85
  pattern: "(tar|zip|7z)\\s+[^\\n]*~/?\\.ssh|(find|ls|cat|strings)\\s+[^\\n]*(wallet\\.dat|seed\\.txt|mnemonic|keystore)[^\\n]*(\\||>|>>|curl|wget|fetch|POST)|sqlite3\\s+[^\\n]*(Cookies|Login\\s*Data|cookies\\.sqlite|places\\.sqlite)"
  match_on: content
  case_insensitive: true
  title: "Compound skill-content exfiltration (wallet/browser/SSH archival)"
  expires_at: null
  revoked: false
  # Adapted from ATR-2026-00149: condensed ATR's 13 detection conditions into
  # one regex covering SSH archival, crypto wallet exfil, and browser DB dump;
  # omits ATR's DNS-exfil, IMDS metadata, and env-file piping layers.
  # Intentional layering with CLT-CRED-008 (command artifact): that rule catches
  # the same SSH archival at shell execution time; this rule catches it in
  # written skill/plugin content before it executes.

# CLT-SKL-007 intentionally omitted — dropped for FP risk during ATR curation.

- id: "CLT-SKL-008"
  category: skill_compromise
  severity: warning
  confidence: 0.85
  pattern: "(?:(?:always|must|shall|will|should)\\s+){1,3}(?:approve|accept|allow|grant|permit)\\b[^.\\n]{0,80}(?:without|regardless|even\\s+if|despite)\\s+(?:confirmation|permission|approval|consent|asking|checking|verification|user)"
  match_on: content
  case_insensitive: true
  title: "Hidden override instruction in skill -- auto-approve all"
  expires_at: null
  revoked: false
  # Adapted from ATR-2026-00163: added "will"/"should" modals and "despite" as
  # an additional consent-bypass synonym; bounded modal repetition to {1,3}.

# ===========================================================================
# CONTEXT EXFILTRATION
# ===========================================================================

- id: "CLT-CTX-003"
  category: context_exfiltration
  severity: critical
  confidence: 0.95
  pattern: "-----BEGIN\\s+[A-Z ]+PRIVATE\\s+KEY-----[\\s\\S]{40,}-----END\\s+[A-Z ]+PRIVATE\\s+KEY-----"
  match_on: content
  title: "PEM private key block appearing in agent content"
  expires_at: null
  revoked: false
  # Source: ATR-2026-00021 (pattern unchanged from upstream). Fires on Write/Edit
  # content and session-start plugin scans (category context_exfiltration is
  # pre-hook only; post-hook scanning is limited to prompt_injection rules).
  # Covers RSA, EC, DSA, OPENSSH, ENCRYPTED variants.

# ===========================================================================
# SUPPLY CHAIN
# ===========================================================================

- id: "CLT-SUPPLY-002"
  category: supply_chain
  severity: warning
  confidence: 0.95
  pattern: "(?:filesytem|filsystem|file_sytem|flie_system|filessystem|filesystm|filsystm|filesysem)[-_](?:read|write|list|delete|search)"
  match_on: content
  case_insensitive: true
  title: "Typosquatted filesystem tool name (targets MCP filesystem server)"
  expires_at: null
  revoked: false
  # Adapted from ATR-2026-00060: extracted filesystem-server typo variants only;
  # narrows ATR's broader MCP squatting rule to the
  # @modelcontextprotocol/server-filesystem impersonation family.
