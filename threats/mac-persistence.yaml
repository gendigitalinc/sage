# Covers: LaunchAgents, Login Items, Authorization plugins, periodic scripts, emond, dylib hijack

# LaunchAgent/LaunchDaemon plist (migrated from persistence.yaml CLT-PERSIST-004)
- id: "CLT-MAC-PERSIST-001"
  category: tool
  severity: warning
  confidence: 0.90
  pattern: "(LaunchAgents|LaunchDaemons)/.*\\.plist"
  match_on: command
  title: "macOS LaunchAgent/LaunchDaemon persistence"
  expires_at: null
  revoked: false

# Login Items via osascript
- id: "CLT-MAC-PERSIST-002"
  category: tool
  severity: warning
  confidence: 0.60
  pattern: "\\bosascript\\b.*login item"
  case_insensitive: true
  match_on: command
  title: "Add login item via osascript"
  expires_at: null
  revoked: false

# Login window manipulation via defaults
- id: "CLT-MAC-PERSIST-003"
  category: tool
  severity: warning
  confidence: 0.60
  pattern: "\\bdefaults\\b.*\\bwrite\\b.*loginwindow.*(AutoLaunch|LoginHook|LogoutHook)"
  case_insensitive: true
  match_on: command
  title: "Login window hook manipulation via defaults write"
  expires_at: null
  revoked: false

# Authorization plugin persistence
