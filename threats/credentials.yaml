# --- Known API key prefixes ---
- id: "CLT-CRED-001"
  category: secrets
  severity: critical
  confidence: 0.80
  pattern: "(sk-[a-zA-Z0-9_-]{20,}|sk-proj-[a-zA-Z0-9_-]{20,}|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|ghp_[0-9a-zA-Z]{36}|gho_[0-9a-zA-Z]{36}|glpat-[0-9a-zA-Z_-]{20,}|xox[baprs]-[0-9a-zA-Z-]+)"
  match_on: [command, content]
  title: "Known API key prefix detected"
  expires_at: null
  revoked: false

# --- Export of credential env vars ---
- id: "CLT-CRED-002"
  category: secrets
  severity: warning
  confidence: 0.60
  pattern: "\\bexport\\s+[A-Z_]*(API_KEY|SECRET|TOKEN|PASSWORD|CREDENTIAL|AUTH)[A-Z_]*="
  match_on: command
  title: "Export of environment variable with credential keyword"
  expires_at: null
  revoked: false

# --- .env file writes ---
- id: "CLT-CRED-003"
  category: secrets
  severity: warning
  confidence: 0.60
  pattern: "(>>|>)\\s*\\.env(?!\\S*\\.(example|sample|template|dist)\\b)(\\.local|\\.production|\\.prod|\\.staging|\\.stage|\\.development|\\.dev|\\.test)?\\b"
  match_on: command
  title: "Write/append to .env file (potential credential exposure)"
  expires_at: null
  revoked: false

# --- Reading credential files ---
- id: "CLT-CRED-004"
  category: secrets
  severity: warning
  confidence: 0.60
  pattern: "\\b(cat|less|more|head|tail)\\s+.*(\\.(env(?!\\S*\\.(example|sample|template|dist)\\b)(\\.(local|production|prod|staging|stage|development|dev|test))?)|credentials|\\.aws/credentials|\\.ssh/id_rsa|\\.ssh/id_ed25519|\\.netrc|\\.pgpass)"
  match_on: command
  title: "Reading credential or secret file"
  expires_at: null
  revoked: false

# --- Plaintext credential assignment ---
- id: "CLT-CRED-005"
  category: secrets
  severity: warning
  confidence: 0.60
  pattern: "\\b(PASSWORD|API_SECRET|SECRET_KEY|PRIVATE_KEY|DB_PASSWORD|MYSQL_PASSWORD|POSTGRES_PASSWORD)=[\"']?[^\\s\"']{8,}"
  match_on: [command, content]
  title: "Plaintext credential assignment detected"
  expires_at: null
  revoked: false

# --- Long-form API key patterns ---
- id: "CLT-CRED-006"
  category: secrets
  severity: critical
  confidence: 0.92
  pattern: "(github_pat_[0-9a-zA-Z_]{22,}|SG\\.[0-9a-zA-Z_-]{22,}\\.[0-9a-zA-Z_-]{22,}|pk_live_[0-9a-zA-Z]{24,}|sk_live_[0-9a-zA-Z]{24,}|rk_live_[0-9a-zA-Z]{24,})"
  match_on: [command, content]
  title: "Long-form API key pattern detected (GitHub PAT, SendGrid, Stripe)"
  expires_at: null
  revoked: false

# --- Copy/move/link secret files ---
- id: "CLT-CRED-007"
  category: secrets
  severity: warning
  confidence: 0.60
  # Protected files: .env*, .aws/credentials, .ssh/(id_rsa|id_ed25519|id_ecdsa|id_dsa),
  # .netrc, .pgpass, .npmrc, .pypirc, key.properties, .docker/config.json,
  # kubeconfig, .kube/config, master.key, credentials.yml
  pattern: "\\b(cp|mv|ln|rsync|install|ditto)\\s+.*(?<=[\\\\/\\s])(\\.env(?!\\S*\\.(example|sample|template|dist)\\b)(\\.\\w+)?(?=[\\s\\\\/]|$)|\\.aws/credentials|\\.ssh/(id_rsa|id_ed25519|id_ecdsa|id_dsa)|\\.netrc|\\.pgpass|\\.npmrc|\\.pypirc|key\\.properties|\\.docker/config\\.json|kubeconfig|\\.kube/config|master\\.key|credentials\\.yml)"
  match_on: command
  title: "Copy/move/link of credential or secret file"
  expires_at: null
  revoked: false

# --- Archive secret files ---
- id: "CLT-CRED-008"
  category: secrets
  severity: warning
  confidence: 0.60
  # Protected files: .env*, .aws/credentials, .ssh/(id_rsa|id_ed25519|id_ecdsa|id_dsa),
  # .netrc, .pgpass, .npmrc, .pypirc, key.properties, .docker/config.json,
  # kubeconfig, .kube/config, master.key, credentials.yml
  pattern: "\\b(tar|zip|7z|rar|gzip)\\s+.*(?<=[\\\\/\\s])(\\.env(?!\\S*\\.(example|sample|template|dist)\\b)(\\.\\w+)?(?=[\\s\\\\/]|$)|\\.aws/credentials|\\.ssh/(id_rsa|id_ed25519|id_ecdsa|id_dsa)|\\.netrc|\\.pgpass|\\.npmrc|\\.pypirc|key\\.properties|\\.docker/config\\.json|kubeconfig|\\.kube/config|master\\.key|credentials\\.yml)"
  match_on: command
  title: "Archiving credential or secret file"
  expires_at: null
  revoked: false
