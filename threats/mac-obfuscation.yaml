# Swift/swiftc inline execution
- id: "CLT-MAC-OBFUS-007"
  category: tool
  severity: warning
  confidence: 0.60
  pattern: "\\bswift\\b\\s+-e\\s+[\"'].*\\b(Process|NSTask|URLSession|shell)\\b"
  case_insensitive: true
