# Dummy threat patterns for Sage smoke-testing
# Author: Test — NOT real threats
#
# Canary rules that match completely harmless, highly-specific marker strings.
# The "__sage_test_" prefix would never appear in real-world code,
# making false positives essentially impossible.
#
# Coverage matrix:
#   Tool           match_on    block(deny)  require_approval(ask)  log(allow)
#   ───────────    ────────    ───────────  ─────────────────────  ──────────
#   Bash           command     ✓ ✓          ✓ ✓                    ✓
#   Write/Edit     file_path   ✓            ✓                      ✓
#   Write/Edit     content     ✓            ✓                      ✓
#   WebFetch/Bash  url         ✓            ✓                      ✓
#   WebFetch/Bash  domain      ✓            —                      —
#
# The file_path rules also cover Read, Delete, Glob, and LS tools
# (they produce the same artifact type).
# The url rules also cover URLs embedded in Bash commands and file content.

