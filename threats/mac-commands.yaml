# --- osascript Remote Code Execution ---

# osascript -e 'do shell script' (AppleScript shell execution)
- id: "CLT-MAC-CMD-001"
  category: tool
  severity: critical
  confidence: 0.95
  pattern: "\\bosascript\\b.*-e.*do shell script"
  case_insensitive: true
  match_on: command
  title: "AppleScript shell execution via osascript -e"
  expires_at: null
  revoked: false

# osascript -l JavaScript (JXA execution)
- id: "CLT-MAC-CMD-002"
  category: tool
  severity: critical
  confidence: 0.90
  pattern: "\\bosascript\\b.*-l\\s+JavaScript"
  case_insensitive: true
  match_on: command
  title: "JavaScript for Automation (JXA) execution via osascript"
  expires_at: null
  revoked: false

# Pipe to osascript (stdin AppleScript execution)
- id: "CLT-MAC-CMD-003"
  category: tool
  severity: critical
  confidence: 0.90
  pattern: "\\|\\s*osascript"
  match_on: command
  title: "Piped input to osascript (stdin AppleScript execution)"
  expires_at: null
  revoked: false

# osascript loading script file from remote download
- id: "CLT-MAC-CMD-004"
  category: tool
  severity: critical
  confidence: 0.90
  pattern: "(curl|wget).*\\|.*osascript|osascript.*(curl|wget)"
  case_insensitive: true
  match_on: command
  title: "Remote script download piped to osascript"
  expires_at: null
  revoked: false

