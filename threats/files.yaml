# Sensitive file path threat patterns for Sage
# Author: Gen Digital Inc.
# License: DRL-1.1 (see threats/LICENSE)
# Detects Read/Write/Edit/Delete operations targeting security-sensitive files

# --- System auth files ---
- id: "CLT-FILE-001"
  category: secrets
  severity: critical
  confidence: 0.95
  pattern: "(/etc/passwd|/etc/shadow|/etc/sudoers)"
  match_on: file_path
  title: "Access system authentication file"
  expires_at: null
  revoked: false

# --- SSH authorized_keys ---
- id: "CLT-FILE-002"
  category: secrets
  severity: critical
  confidence: 0.95
  pattern: "\\.ssh/authorized_keys"
  match_on: file_path
  title: "Access SSH authorized_keys (unauthorized access persistence)"
  expires_at: null
  revoked: false

# --- SSH private keys and config ---
- id: "CLT-FILE-003"
