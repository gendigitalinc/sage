# --- Credential/env files ---
# NOTE: Uses allowlist approach (explicit suffix enumeration) unlike CLT-CRED-003's
# denylist approach (negative lookahead). This means unknown suffixes like .env.ci
# match CRED-003 but not FILE-008 — intentional, since file_path matching is more
# targeted than command-string matching.
- id: "CLT-FILE-008"
  category: secrets
  severity: warning
  confidence: 0.60
  pattern: "((^|[\\/\\\\])\\.env(\\.local|\\.production|\\.prod|\\.staging|\\.stage|\\.development|\\.dev|\\.test)?|\\.aws/credentials|\\.netrc|\\.pgpass)$"
  match_on: file_path
  title: "Access credential or environment file"
  expires_at: null
  revoked: false

