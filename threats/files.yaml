# --- Private keys and certificates ---
# NOTE: .pem also matches public cert chains (fullchain.pem, ca-bundle.pem).
# Accepted trade-off: require_approval keeps noise bounded, and excluding .pem
# would miss private key exfiltration.
- id: "CLT-FILE-016"
  category: secrets
  severity: warning
  confidence: 0.60
  pattern: "\\.(pem|p12|pfx|p8)$"
  match_on: file_path
  title: "Access private key or certificate file"
  expires_at: null
  revoked: false

