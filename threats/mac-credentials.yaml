# Keychain password extraction (find-generic-password)
- id: "CLT-MAC-CRED-001"
  category: secrets
  severity: critical
  confidence: 0.95
  pattern: "\\bsecurity\\b.*\\bfind-generic-password\\b.*-w"
  match_on: command
  title: "Keychain password extraction via security find-generic-password"
  expires_at: null
  revoked: false

