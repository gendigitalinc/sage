# macOS sensitive file path threat patterns for Sage
# Author: Gen Digital Inc.
# License: DRL-1.1 (see threats/LICENSE)
# Detects Read/Write/Edit/Delete operations targeting macOS security-sensitive files

# LaunchAgent/LaunchDaemon plist (migrated from files.yaml CLT-FILE-005)
- id: "CLT-MAC-FILE-001"
  category: tool
  severity: warning
  confidence: 0.90
  pattern: "(LaunchAgents|LaunchDaemons)/.*\\.plist$"
  match_on: file_path
  title: "Access macOS LaunchAgent/LaunchDaemon plist"
  expires_at: null
  revoked: false

# TCC privacy permissions database
- id: "CLT-MAC-FILE-002"
  category: secrets
  severity: critical
  confidence: 0.95
  pattern: "com\\.apple\\.TCC/TCC\\.db"
  match_on: file_path
  title: "Access TCC privacy permissions database"
  expires_at: null
  revoked: false

# Authorization database
- id: "CLT-MAC-FILE-003"
  category: secrets
  severity: critical
  confidence: 0.95
  pattern: "(/etc/authorization|/var/db/auth\\.db)"
  match_on: file_path
  title: "Access macOS authorization database"
  expires_at: null
  revoked: false

# Kernel extensions
- id: "CLT-MAC-FILE-004"
  category: tool
  severity: critical
  confidence: 0.90
  pattern: "(/Library/Extensions/|/System/Library/Extensions/).*\\.kext"
  match_on: file_path
  title: "Access kernel extension (.kext)"
  expires_at: null
  revoked: false

