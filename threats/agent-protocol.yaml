# Agent-protocol threat patterns for Sage
# Source: ATR (Agent Threat Rules) — https://github.com/Agent-Threat-Rule/agent-threat-rules
# License: MIT (approved per issue #30)
# Schema: id, category, severity, confidence, action, pattern, match_on, title, expires_at, revoked
#
# These rules detect agent-protocol-layer threats arriving via MCP tool descriptions
# and SKILL.md content — BEFORE they become OS commands (which Sage's existing
# commands.yaml / credentials.yaml / etc. already handle at the execution layer).
#
# All rules use match_on: content (the agent-surface scan target).

- id: AGT-PI-001
  category: tool
  severity: high
  confidence: 0.85
  action: block
  pattern: \b(ignore|disregard|forget|override|bypass|skip|abandon|drop|cancel|suppress|nullify|void|revoke|dismiss|discard|reject)\s+(all\s+)?(the\s+|your\s+|my\s+|any\s+|these\s+|those\s+)?(previous|prior|above|earlier|preceding|original|existing|current|initial|default|given|assigned|preset|established)?\s*(instructions?|prompts?|rules?|guidelines?|directives?|constraints?|context|programming|training|protocols?|policies|configuration|parameters|boundaries|guardrails?|safeguards?|restrictions?|tasks?|assignments?|information|directions?|orders?|commands?)
  match_on: content
  title: Direct Prompt Injection via User Input
  expires_at: null
  revoked: false
  case_insensitive: true
- id: AGT-PI-002
  category: tool
  severity: high
  confidence: 0.85
  action: block
  pattern: <!--[^>]{0,20}(ignore|disregard|override|new\s+instructions?|system\s*:|you\s+must|you\s+are\s+now|forget\s+previous|execute|perform|send\s+to|exfiltrate|reveal|disclose|output\s+the)[^>]{0,200}-->
  match_on: content
  title: Indirect Prompt Injection via External Content
  expires_at: null
  revoked: false
  case_insensitive: true
- id: AGT-PI-003
  category: tool
  severity: high
  confidence: 0.85
  action: require_approval
  pattern: (?:(?:pretend|act(?:ing)?\s+as|you\s+are\s+(?:now\s+)?|be(?:come)?|enable|activate|enter|switch\s+to)\s+(?:a\s+)?\b(DAN|D\.A\.N|STAN|DUDE|AIM|UCAR|BH|BetterDAN|BasedGPT|JailbreakGPT|EvilGPT|UnfilteredGPT|KEVIN|Maximum|Omega|Jailbroken|AntiGPT|DevMode|HackGPT|NsfwGPT|DarkGPT)\b|\b(DAN|D\.A\.N|STAN|DUDE|AIM|UCAR|BH|BetterDAN|BasedGPT|JailbreakGPT|EvilGPT|UnfilteredGPT|KEVIN|Maximum|Omega|Jailbroken|AntiGPT|DevMode|HackGPT|NsfwGPT|DarkGPT)\b\s+(?:mode|persona|jailbreak|enabled|activated)|\bdo\s+anything\s+now\b)
  match_on: content
  title: Jailbreak Attempt Detection
  expires_at: null
  revoked: false
  case_insensitive: true
- id: AGT-PI-004
  category: tool
  severity: critical
  confidence: 0.92
  action: block
  pattern: \b(new|updated|revised|replacement|corrected|actual|real|true|proper|authentic|overriding|amended|modified|changed|current)\s+(system\s+)?(prompt|message|instructions?|directives?|guidelines?|configuration|persona|behavior|role\s+definition)\s*[:=\-]
