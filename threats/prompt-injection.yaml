# Prompt injection detection heuristic rules (tier 1)
# Catches common PI patterns with zero model dependency, ~1ms.
# Designed for low false-positive rate on coding content.
#
# Sources: original Sage PI prototype, PR #90 (promptware), @stackone/defender patterns.
# These complement the ML model (tier 2) which handles subtler attacks.

# ── Instruction Override ────────────────────────────────────────────
# The most common PI pattern family. Well-established attack surface.

- id: "CLT-PI-001"
  category: prompt_injection
  severity: critical
  confidence: 0.90
  case_insensitive: true
  pattern: "ignore\\s+(all\\s+)?(previous|prior|above|earlier)\\s+(instructions?|directives?|rules?|guidelines?|prompts?|directions?)"
  match_on: content
  title: "Instruction override: ignore previous"
  expires_at: null
  revoked: false

- id: "CLT-PI-002"
  category: prompt_injection
  severity: critical
  confidence: 0.90
  case_insensitive: true
  pattern: "disregard\\s+(all\\s+)?(previous|prior|above|your)\\s+(instructions?|directives?|rules?|guidelines?|safety)"
  match_on: content
  title: "Instruction override: disregard directives"
  expires_at: null
  revoked: false

- id: "CLT-PI-003"
  category: prompt_injection
  severity: critical
  confidence: 0.90
  case_insensitive: true
  pattern: "forget\\s+(all\\s+)?(your\\s+)?(previous\\s+)?(instructions?|rules?|guidelines?|restrictions?|constraints?|context)"
  match_on: content
  title: "Instruction override: forget instructions"
  expires_at: null
  revoked: false

- id: "CLT-PI-004"
  category: prompt_injection
  severity: critical
  confidence: 0.90
  case_insensitive: true
  pattern: "override\\s+(the\\s+)?(system\\s+)?(prompt|instructions?|rules?|guidelines?)"
  match_on: content
  title: "Instruction override: direct override"
  expires_at: null
  revoked: false

- id: "CLT-PI-005"
  category: prompt_injection
  severity: warning
  confidence: 0.85
  case_insensitive: true
  pattern: "(new|updated?|revised?|changed?)\\s+instructions?:\\s*"
  match_on: content
  title: "Instruction override: inject new instructions"
  expires_at: null
  revoked: false

# ── Role / Persona Override ─────────────────────────────────────────
# Attempts to reassign the AI's identity or role.

- id: "CLT-PI-010"
  category: prompt_injection
  severity: critical
  confidence: 0.90
  case_insensitive: true
  pattern: "you\\s+are\\s+now\\s+(a\\s+)?(different|new|the|my|an?\\s+unrestricted|an?\\s+unfiltered)"
  match_on: content
  title: "Role override: identity reassignment"
  expires_at: null
  revoked: false

- id: "CLT-PI-011"
  category: prompt_injection
  severity: warning
  confidence: 0.85
  case_insensitive: true
  pattern: "\\bDAN\\b.*?(do\\s+anything|jailbreak|no\\s+restrictions)"
  match_on: content
  title: "Role override: DAN jailbreak"
  expires_at: null
  revoked: false
  # Intentional layering with CLT-PI-092 (ATR): this rule requires an explicit
  # qualifier (jailbreak/no restrictions) after DAN; CLT-PI-092 instead requires
  # an activation prefix (pretend/act as/you are) before the persona name.

- id: "CLT-PI-012"
  category: prompt_injection
  severity: warning
  confidence: 0.85
  case_insensitive: true
  pattern: "developer\\s+mode\\s+(is\\s+)?(now\\s+)?(enabled?|activated?|on).{0,50}(comply|content\\s+polic|no\\s+restrict|without\\s+restrict|any\\s+request)"
  match_on: content
  title: "Role override: developer mode jailbreak"
  expires_at: null
  revoked: false

- id: "CLT-PI-013"
  category: prompt_injection
  severity: warning
  confidence: 0.85
  case_insensitive: true
  pattern: "act\\s+(as|like)\\s+(a\\s+)?(system|admin|root|superuser)"
  match_on: content
  title: "Role override: privileged role assumption"
  expires_at: null
  revoked: false

