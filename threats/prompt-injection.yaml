# ── Structural Injection ───────────────────────────────────────────
# Injection hiding in HTML, markdown, or JSON structures.

- id: "CLT-PI-050"
  category: prompt_injection
  severity: warning
  confidence: 0.85
  case_insensitive: true
  pattern: "<!--\\s*(?:system|ignore|instruction|prompt|important|override|execute).*?-->"
  match_on: content
  title: "Structural injection: HTML comment with injection keywords"
  expires_at: null
  revoked: false
  # Intentional layering with CLT-PI-091 (ATR): this rule matches injection
  # keywords anywhere in the comment body; CLT-PI-091 adds a distinct signal
  # for keywords appearing within 20 chars of the opening tag.

- id: "CLT-PI-051"
  category: prompt_injection
  severity: warning
  confidence: 0.85
  case_insensitive: true
  # Require a reasonably long hidden link target/title plus a high-signal PI phrase.
  pattern: "\\[[^\\]]*\\]\\((?=[^)]{40,}\\))[^)]*(?:ignore\\s+previous\\s+instructions|forget\\s+instructions|system\\s+prompt|override\\s+instructions)[^)]*\\)"
  match_on: content
  title: "Structural injection: markdown link with hidden injection"
  expires_at: null
  revoked: false

- id: "CLT-PI-052"
  category: prompt_injection
  severity: warning
  confidence: 0.85
  case_insensitive: true
  pattern: "<important>[\\s\\S]{0,600}?\\b(send|exec|fetch|invoke|extract|pass|forward|upload)\\b[\\s\\S]{0,300}?</important>"
  match_on: content
  title: "Structural injection: MCP IMPORTANT-tag cross-tool shadowing"
  expires_at: null
  revoked: false
  # Adapted from ATR-2026-00161: uses ATR Layer 1 only (upstream has 5 detection
  # layers); dropped verbs read/include/must to reduce FP on benign documentation.
  # Fires in pre-hook (Write/Edit content blocking) and post-hook advisory
  # output scanning (Read/Bash/WebFetch); also caught by session-start plugin scan.

# ── Role Marker Injection ──────────────────────────────────────────
# Fake conversation turn markers to confuse the model.

- id: "CLT-PI-060"
  category: prompt_injection
  severity: warning
  confidence: 0.85
  case_insensitive: true
  pattern: "\\n\\s*\\n\\s*(Human|User|Assistant|System)\\s*:"
  match_on: content
  title: "Role marker injection: fake conversation turn"
  expires_at: null
  revoked: false

- id: "CLT-PI-061"
  category: prompt_injection
  severity: warning
  confidence: 0.85
  case_insensitive: true
  pattern: "\\[INST\\]|\\[/INST\\]"
  match_on: content
  title: "Role marker injection: Llama instruction format"
  expires_at: null
  revoked: false

# ── Encoding / Obfuscation ─────────────────────────────────────────
# Obfuscated injection attempts.

- id: "CLT-PI-070"
  category: prompt_injection
  severity: warning
  confidence: 0.60
  case_insensitive: true
  pattern: "1gn0r3|f0rg3t|byp4ss|syst3m|4dm1n"
  match_on: content
  title: "Encoding: leetspeak obfuscation of injection keywords"
  expires_at: null
  revoked: false

# ── Credential Exfiltration via Injection ──────────────────────────
# PI-driven data exfiltration patterns. Note: bare curl/wget commands
# are NOT PI — these only match when combined with credential targets.

- id: "CLT-PI-080"
  category: prompt_injection
  severity: warning
  confidence: 0.80
  case_insensitive: true
  pattern: "cat\\s+~/\\.(env|ssh|aws|gnupg).*\\|.*curl"
  match_on: content
  title: "Credential exfiltration: pipe dotfile to curl"
  expires_at: null
  revoked: false

- id: "CLT-PI-081"
  category: prompt_injection
  severity: warning
  confidence: 0.80
  case_insensitive: true
  pattern: "output\\s+(all\\s+)?(the\\s+)?environment\\s+variables.{0,50}(send|post|upload|exfiltrat|curl|fetch)"
  match_on: content
  title: "Credential exfiltration: dump env vars and send"
  expires_at: null
  revoked: false

# ── ATR Delivery Variants ──────────────────────────────────────────────────
# Rules below are adapted from the ATR project
# (https://github.com/Agent-Threat-Rule/agent-threat-rules),
# Copyright (c) 2026 ATR Contributors, MIT License.
# Included in Sage under the ATR MIT license per issue #30.
# See threats/agent-layer.yaml for companion non-PI rules from the same contribution.
# Sage-specific modifications to each rule are noted in its comment block.

- id: "CLT-PI-091"
  category: prompt_injection
  severity: warning
  confidence: 0.85
  pattern: "<!--[\\s\\S]{0,20}?(ignore|disregard|override|new\\s+instructions?|you\\s+must|you\\s+are\\s+now|forget\\s+previous|send\\s+to|exfiltrate)\\b"
  match_on: content
  case_insensitive: true
  title: "Indirect prompt injection hidden in HTML comment"
  expires_at: null
  revoked: false
  # Adapted from ATR-2026-00002: extracted HTML-comment delivery condition only;
  # narrowed keyword list (dropped reveal, disclose, output, execute, perform)
  # to reduce FP; changed [^>] to [\s\S] so comparisons (a>b) before the keyword
  # don't cause false negatives. Intentional layering with CLT-PI-050 (which
  # matches keywords anywhere in the comment body): this rule adds a near-tag
  # precision signal.

- id: "CLT-PI-092"
  category: prompt_injection
  severity: warning
  confidence: 0.85
  pattern: "(?:(?:pretend|Pretend|act(?:ing)?\\s+as|Act(?:ing)?\\s+as|you\\s+are(?:\\s+now)?|You\\s+are(?:\\s+now)?|be(?:come)|Be(?:come))\\s+(?:(?:a|the|in|into|on)\\s+)?\\b(DAN|D\\.A\\.N|STAN|DUDE|AIM|UCAR|BH|BetterDAN|Evil\\s*Confidant|God\\s*Mode|Jailbreak\\s*Mode|Unrestricted\\s*Mode|Sudo\\s*Mode|Root\\s*Mode|Admin\\s*Mode)\\b)"
  match_on: content
  case_insensitive: false
  title: "Jailbreak persona activation attempt (DAN/STAN/God-Mode family)"
  expires_at: null
  revoked: false
  # Adapted from ATR-2026-00003: curated 16 highest-signal personas from ATR's
  # 20+ (dropped KEVIN, Maximum, Omega, EvilGPT etc.); added space-separated
  # mode names (God Mode, Jailbreak Mode). Case-sensitive (ATR is case-insensitive)
  # to avoid FP on the common first name "Dan"; activation verbs include
  # capitalized variants (Act/You/Pretend/Be) to cover sentence-start phrasing.

- id: "CLT-PI-093"
  category: prompt_injection
  severity: warning
  confidence: 0.85
  pattern: "(?:忽略|无视|無視|忘记|忘記|跳过|跳過|绕过|繞過|覆盖|覆蓋|不要遵守|不要遵循)(?:之前|先前|以前|上述|上面)?(?:的)?(?:所有|一切|全部)?(?:指令|命令|指示|要求|规则|規則|系统|系統|提示|提醒|对话|對話)|(?:無視して|忘れて|無効にし)(?:以前|先の|上記)の(?:指示|命令|ルール|システム)|(?:이전|전의|앞의)(?:\\s*)(?:명령|지시|규칙|시스템|프롬프트)(?:을|를|은|는)?(?:\\s*)(?:무시|잊|건너뛰|우회)"
  match_on: content
  case_insensitive: false
  title: "CJK prompt-injection override (Chinese/Japanese/Korean)"
  expires_at: null
  revoked: false
  # Source: ATR-2026-00097 (pattern unchanged from upstream). Covers zh-CN, zh-TW, ja, ko.
