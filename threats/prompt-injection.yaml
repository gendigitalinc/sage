# ── Credential Exfiltration via Injection ──────────────────────────
# PI-driven data exfiltration patterns. Note: bare curl/wget commands
# are NOT PI — these only match when combined with credential targets.

- id: "CLT-PI-080"
  category: prompt_injection
  severity: high
  confidence: 0.80
  action: block
  case_insensitive: true
  pattern: "cat\\s+~/\\.(env|ssh|aws|gnupg).*\\|.*curl"
  match_on: content
  title: "Credential exfiltration: pipe dotfile to curl"
  expires_at: null
  revoked: false

- id: "CLT-PI-081"
  category: prompt_injection
  severity: high
  confidence: 0.80
  action: block
  case_insensitive: true
  pattern: "output\\s+(all\\s+)?(the\\s+)?environment\\s+variables.{0,50}(send|post|upload|exfiltrat|curl|fetch)"
  match_on: content
  title: "Credential exfiltration: dump env vars and send"
  expires_at: null
  revoked: false
