# ── Structural Injection ───────────────────────────────────────────
# Injection hiding in HTML, markdown, or JSON structures.

- id: "CLT-PI-050"
  category: prompt_injection
  severity: high
  confidence: 0.85
  action: block
  case_insensitive: true
  pattern: "<!--\\s*(?:system|ignore|instruction|prompt|important|override|execute).*?-->"
  match_on: content
  title: "Structural injection: HTML comment with injection keywords"
  expires_at: null
  revoked: false

- id: "CLT-PI-051"
  category: prompt_injection
  severity: high
  confidence: 0.85
  action: block
  case_insensitive: true
  pattern: "\\[.*?\\]\\(.*?(?:ignore|forget|system|instruction|override).*?\\)"
  match_on: content
  title: "Structural injection: markdown link with hidden injection"
  expires_at: null
  revoked: false

