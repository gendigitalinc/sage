name: ATR Upstream Sync (opt-in)

# This workflow is DISABLED by default.
#
# To enable, change `if: false` below to `if: true` and ensure the
# `agent-threat-rules` npm package is in dependencies. The workflow then
# runs weekly, regenerates threats/agent-layer.atr-generated.yaml, and opens
# a DRAFT pull request against pre-release. Sage maintainers review and
# decide what to merge into threats/agent-layer.yaml.
#
# No PR is ever auto-merged. The Sage maintainer retains full editorial
# control. See docs/INTEROP.md for details.

on:
  schedule:
    # Mondays at 06:00 UTC. Change cadence here if desired.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: false # ← change to `true` to enable
    name: Regenerate agent-layer.atr-generated.yaml from ATR upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pre-release

      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Regenerate generated file
        run: pnpm exec tsx scripts/sync-with-atr.ts

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet threats/agent-layer.atr-generated.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open draft PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: atr-sync-${{ github.run_id }}
          base: pre-release
          draft: true
          title: 'chore(threats): ATR upstream sync proposal'
          body: |
            Automated proposal from ATR (Agent Threat Rules) upstream.

            This PR regenerates `threats/agent-layer.atr-generated.yaml` from
            the current pinned ATR version (see `threats/.atr-bridge-config.yaml`).

            Review the diff in `agent-layer.atr-generated.yaml`. To merge
            specific rules into the production `agent-layer.yaml`, copy them
            manually. To exclude rules from future sync, add their ATR ids
            to `exclude_ids` in the config.

            This PR is DRAFT and will not be auto-merged.
          commit-message: 'chore(threats): ATR upstream sync ${{ github.run_id }}'
